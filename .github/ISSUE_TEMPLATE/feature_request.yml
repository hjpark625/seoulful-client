name: 기능 제안
description: 새로운 기능이나 UX 개선 아이디어를 제안합니다.
title: '[Feature] '
labels:
  - enhancement
  - needs-triage
assignees:
  - hjpark625
body:
  - type: markdown
    attributes:
      value: |
        왜 필요한지와 사용 시나리오를 함께 적어 주시면 우선순위 판단에 도움이 됩니다.
  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 현재 어떤 점이 불편한지 설명해 주세요.
      placeholder: 주말에 갈 만한 전시를 찾을 때 필터 조합이 부족해서 원하는 결과를 찾기 어렵습니다.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결 방법
      description: 원하는 기능이나 개선안을 적어 주세요.
      placeholder: 날짜, 분위기, 실내/실외를 함께 조합할 수 있는 필터를 추가하면 좋겠습니다.
    validations:
      required: true
  - type: textarea
    id: benefit
    attributes:
      label: 기대 효과
      description: 이 기능이 왜 유용한지 알려 주세요.
      placeholder: 조건에 맞는 장소를 더 빠르게 찾을 수 있어 탐색 시간이 줄어듭니다.
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 비슷한 서비스, 화면 예시, 링크가 있다면 남겨 주세요.
      placeholder: 참고 링크나 이미지가 있다면 첨부해 주세요.
